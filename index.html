<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FireDrop OS — Station House BBQ</title>
<style>
  :root{
    /* Firehouse Dark — spec §1.1 tokens */
    --bg:#101214; --bg2:#141619; --panel:#17191C; --panel2:#1E2126; --line:#262a30; --line2:#333842;
    --ink:#F2F0EB; --mut:#9BA0A8; --mut2:#6E747D;
    --ember:#E8590C; --ember2:#F5760C; --emberdim:#2a1810;
    --red:#E5484D; --reddim:#2c1416; --green:#46A758; --greendim:#122419; --blue:#4C8DFF;
    --amber:#F5A623; --amberdim:#2a2109; --smoke:#6E747D;
    --radius:8px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden;font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#2a2f3a;border-radius:6px}
  .hide{display:none!important}

  /* ---------- LOGIN ---------- */
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(1200px 600px at 50% -10%,#1a1206,#0d0e11 60%)}
  .login-card{width:380px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:36px 32px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .mark{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;letter-spacing:-.02em}
  .drop{width:26px;height:26px;border-radius:50% 50% 50% 0;background:linear-gradient(160deg,var(--ember2),var(--ember));transform:rotate(45deg);box-shadow:0 0 18px rgba(255,106,26,.45)}
  .login-card h1{font-size:22px;margin:22px 0 4px;letter-spacing:-.02em}
  .login-card p{color:var(--mut);font-size:13px;margin:0 0 22px}
  label.f{display:block;font-size:12px;color:var(--mut);margin:14px 0 6px;letter-spacing:.02em}
  input.f{width:100%;background:#0f1116;border:1px solid var(--line2);color:var(--ink);border-radius:9px;padding:11px 12px;font-size:14px}
  input.f:focus{outline:none;border-color:var(--ember)}

  /* ---------- APP SHELL ---------- */
  #app{display:flex;height:100vh}
  nav.side{width:230px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:16px 12px}
  .side .brand{display:flex;align-items:center;gap:9px;padding:6px 8px 16px;font-weight:800;font-size:17px;letter-spacing:-.02em}
  .side .brand .drop{width:20px;height:20px}
  .navitem{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:var(--mut);font-size:14px;font-weight:500;margin-bottom:2px;border:1px solid transparent}
  .navitem:hover{background:var(--panel);color:var(--ink)}
  .navitem.active{background:var(--panel2);color:var(--ink);border-color:var(--line2)}
  .navitem.active .ic{color:var(--ember)}
  .navitem .ic{width:18px;text-align:center;color:var(--mut2);font-size:15px}
  .navitem .badge{margin-left:auto;background:var(--emberdim);color:var(--ember2);font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px}
  .side .spacer{flex:1}
  .rolebox{border-top:1px solid var(--line);padding-top:12px;margin-top:8px}
  .rolebox .lbl{font-size:11px;color:var(--mut2);padding:0 8px 6px;text-transform:uppercase;letter-spacing:.1em}
  .roletoggle{display:flex;background:#0f1116;border:1px solid var(--line2);border-radius:9px;padding:3px}
  .roletoggle button{flex:1;background:transparent;border:none;color:var(--mut);font-size:12px;font-weight:600;padding:7px;border-radius:6px}
  .roletoggle button.on{background:var(--panel2);color:var(--ink)}

  main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
  .topbar{height:60px;flex-shrink:0;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 24px;background:var(--bg)}
  .search{flex:1;max-width:420px;position:relative}
  .search input{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:9px 12px 9px 34px;font-size:13px}
  .search input:focus{outline:none;border-color:var(--line2)}
  .search .si{position:absolute;left:11px;top:8px;color:var(--mut2)}
  .topbar .date{margin-left:auto;color:var(--mut);font-size:13px}
  .topbar .who{display:flex;align-items:center;gap:9px;font-size:13px}
  .avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(160deg,var(--ember2),var(--ember));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#231000}

  .stage{flex:1;overflow:auto;padding:26px 28px}
  .page-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:22px}
  .page-head h1{font-size:23px;margin:0 0 3px;letter-spacing:-.02em}
  .page-head .sub{color:var(--mut);font-size:13px}
  .page-head .primary{margin-left:auto}

  /* buttons */
  .btn{border:1px solid var(--line2);background:var(--panel2);color:var(--ink);padding:9px 15px;border-radius:9px;font-size:13px;font-weight:600}
  .btn:hover{border-color:var(--mut2)}
  .btn.primary{background:var(--ember);border-color:var(--ember);color:#231000}
  .btn.primary:hover{background:var(--ember2)}
  .btn.sm{padding:6px 11px;font-size:12px}
  .btn.ghost{background:transparent}

  /* cards / grid */
  .grid{display:grid;gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .card h3{margin:0 0 3px;font-size:14px;letter-spacing:-.01em}
  .card .csub{color:var(--mut);font-size:12px;margin-bottom:14px}
  .kpi{font-size:28px;font-weight:800;letter-spacing:-.03em}
  .kpi.sm{font-size:22px}
  .muted{color:var(--mut)} .mut2{color:var(--mut2)}
  .delta{font-size:12px;font-weight:700} .up{color:var(--green)} .down{color:var(--red)}
  .row{display:flex;align-items:center;gap:10px}
  .between{display:flex;align-items:center;justify-content:space-between}
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;border:1px solid var(--line2);color:var(--mut)}
  .tag.ember{background:var(--emberdim);color:var(--ember2);border-color:transparent}
  .tag.amber{background:var(--amberdim);color:var(--amber);border-color:transparent}
  .tag.green{background:var(--greendim);color:var(--green);border-color:transparent}
  .tag.red{background:var(--reddim);color:var(--red);border-color:transparent}
  .tag.blue{background:#12203a;color:var(--blue);border-color:transparent}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--mut2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:0 12px 10px}
  td{padding:12px;border-top:1px solid var(--line)}
  tr.clk:hover td{background:var(--panel2);cursor:pointer}
  .progress{height:8px;background:#0f1116;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--ember),var(--ember2))}

  /* briefing */
  .briefing{background:linear-gradient(120deg,#1a1206,var(--panel) 55%);border:1px solid var(--line2);border-radius:14px;padding:20px 22px;margin-bottom:20px}
  .briefing .bt{font-size:12px;color:var(--ember2);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .prio{display:flex;gap:13px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--line)}
  .prio:first-of-type{border-top:none}
  .prionum{width:22px;height:22px;flex-shrink:0;border-radius:6px;background:var(--emberdim);color:var(--ember2);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .prio .pt{font-size:14px;font-weight:600} .prio .pd{font-size:12.5px;color:var(--mut);margin-top:2px}
  .prio .pa{margin-left:auto}

  /* pipeline */
  .board{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px}
  .col{min-width:230px;flex:1}
  .colhead{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--mut);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
  .colhead .ct{margin-left:auto;background:var(--panel2);color:var(--mut);border-radius:20px;padding:0 8px;font-size:11px}
  .lead{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:9px}
  .lead:hover{border-color:var(--line2);cursor:pointer}
  .lead .ln{font-weight:600;font-size:13.5px}
  .lead .lm{font-size:12px;color:var(--mut);margin:3px 0 8px}
  .sla{font-size:11px;font-weight:700}
  .sla.ok{color:var(--mut)} .sla.warn{color:var(--amber)} .sla.late{color:var(--red)}

  /* detail drawer */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;justify-content:flex-end;z-index:50}
  .drawer{width:560px;max-width:94vw;background:var(--bg2);height:100%;overflow:auto;border-left:1px solid var(--line2);animation:slide .18s ease}
  @keyframes slide{from{transform:translateX(30px);opacity:.4}to{transform:none;opacity:1}}
  .drawer .dh{position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--line);padding:18px 22px;z-index:2}
  .drawer .db{padding:20px 22px}
  .x{float:right;background:transparent;border:none;color:var(--mut);font-size:20px}
  .field{margin-bottom:12px}.field .fl{font-size:11px;color:var(--mut2);text-transform:uppercase;letter-spacing:.05em}.field .fv{font-size:14px;margin-top:2px}
  .stepper{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0 4px}
  .step{font-size:11px;padding:4px 9px;border-radius:20px;background:#0f1116;border:1px solid var(--line);color:var(--mut2)}
  .step.done{background:var(--greendim);color:var(--green);border-color:transparent}
  .step.cur{background:var(--ember);color:#231000;border-color:transparent;font-weight:700}
  .timeline{border-left:2px solid var(--line2);margin-left:6px;padding-left:16px}
  .tl{position:relative;padding:0 0 16px}
  .tl::before{content:"";position:absolute;left:-23px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--ember)}
  .tl .tt{font-size:13px;font-weight:600}.tl .td{font-size:12px;color:var(--mut)}.tl .tm{font-size:11px;color:var(--mut2);margin-top:1px}

  /* kitchen */
  .kmode .stage{padding:24px 30px}
  .kbig{font-size:15px}
  .prodcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;text-align:center}
  .prodcard .pn{font-size:13px;color:var(--mut);font-weight:600}
  .prodcard .pq{font-size:40px;font-weight:800;letter-spacing:-.03em;margin:6px 0}
  .prodcard .pu{font-size:12px;color:var(--mut2)}
  .prodcard.short{border-color:var(--red);background:var(--reddim)}
  .checkitem{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;font-size:15px;background:var(--panel)}
  .checkbox{width:24px;height:24px;border-radius:6px;border:2px solid var(--line2);flex-shrink:0}
  .checkitem.done{opacity:.5}
  .checkitem.done .checkbox{background:var(--green);border-color:var(--green)}
  .queue{display:flex;align-items:center;gap:14px;padding:15px 18px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;background:var(--panel);font-size:15px}
  .slot{font-weight:800;font-size:17px;color:var(--ember2);min-width:74px}

  /* ---------- STABILIZATION (toast, demo, transitions) ---------- */
  .toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(16px);background:#0b0c0e;border:1px solid var(--line2);color:var(--ink);padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:120;opacity:0;pointer-events:none;transition:.22s ease;box-shadow:0 12px 40px rgba(0,0,0,.5);max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .demopill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.12em;color:var(--ember2);background:var(--emberdim);border:1px solid #3a2210;border-radius:20px;padding:4px 11px;margin-right:14px;white-space:nowrap}
  .demofab{position:fixed;right:18px;bottom:18px;z-index:70;background:var(--ember);color:#211a08;border:none;border-radius:24px;padding:11px 16px;font-weight:800;font-size:13px;cursor:pointer;box-shadow:0 10px 30px rgba(232,89,12,.35)}
  .demofab:hover{background:var(--ember2)}
  .overlay,.pal-ov{animation:fadein .14s ease}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @media(max-width:768px){ .demofab{right:12px;bottom:12px;padding:9px 13px} .demopill{display:none} .toast{bottom:70px} }
  /* ---------- UNIVERSAL OBJECT ENGINE (Sprint 4) ---------- */
  .ubrief{background:linear-gradient(120deg,#101a16,var(--panel) 60%);border:1px solid #1e3a2c;border-radius:10px;padding:14px 16px;margin-bottom:6px}
  .ubrief .uh{font-size:11px;color:var(--green);font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
  .ubrief .ur{display:flex;gap:10px;padding:5px 0;font-size:13px}
  .ubrief .ur .k{color:var(--mut2);min-width:130px;font-size:12px}
  .rchip{display:inline-flex;flex-direction:column;gap:1px;border:1px solid var(--line2);border-radius:8px;padding:8px 11px;margin:0 6px 6px 0;cursor:pointer;background:#141519}
  .rchip:hover{border-color:var(--ember)}
  .rchip .rb{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--ember2)}
  .rchip .rt{font-size:12.5px;font-weight:600} .rchip .rs{font-size:11px;color:var(--mut2)}
  .deeplink{display:flex;align-items:center;justify-content:space-between;gap:10px;border-top:1px solid var(--line);margin-top:18px;padding-top:12px;font-size:11px;color:var(--mut2);flex-wrap:wrap}
  .tbtn{background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--mut);padding:7px 11px;font-size:13px;cursor:pointer;white-space:nowrap}
  .tbtn:hover{color:var(--ink);border-color:var(--line2)}
  .pal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:80;display:flex;justify-content:center;align-items:flex-start;padding-top:11vh}
  .pal{width:600px;max-width:92vw;background:var(--panel);border:1px solid var(--line2);border-radius:14px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .pal input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--ink);padding:16px 18px;font-size:16px;outline:none}
  .pal .res{max-height:52vh;overflow:auto}
  .pal .r{display:flex;align-items:center;gap:12px;padding:11px 18px;cursor:pointer;border-bottom:1px solid #191b1f}
  .pal .r:hover,.pal .r.sel{background:var(--panel2)}
  .pal .r .rt{font-weight:600;font-size:14px} .pal .r .rs{font-size:12px;color:var(--mut2);margin-left:auto}
  .pal .rb{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--ember2);border:1px solid var(--line2);border-radius:4px;padding:2px 6px}
  .pal .hint{padding:12px 18px;color:var(--mut2);font-size:12px}
  /* ---------- QUOTE COMPOSER (Sprint 3) ---------- */
  .qgrid{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;align-items:start}
  .qsum{position:sticky;top:12px}
  .pkg{border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:9px;cursor:pointer}
  .pkg:hover{border-color:var(--line2)}
  .pkg.on{border-color:var(--ember);background:var(--emberdim)}
  .pkg .pn{font-weight:700;font-size:14px} .pkg .pd{font-size:12px;color:var(--mut);margin-top:2px}
  .pkg .pp{font-weight:800;color:var(--ember2)}
  .qline{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line);font-size:13px}
  .stepper2{display:flex;align-items:center;gap:8px;margin-left:auto}
  .stepper2 button{width:26px;height:26px;border-radius:6px;border:1px solid var(--line2);background:#17171b;color:var(--ink);font-weight:800;line-height:1}
  .qin{background:#0f1116;border:1px solid var(--line2);color:var(--ink);border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit}
  .sumrow{display:flex;justify-content:space-between;padding:7px 0;font-size:14px}
  .sumrow.big{border-top:1px solid var(--line2);margin-top:4px;padding-top:11px;font-size:16px;font-weight:800}
  .margin-box{background:#12130f;border:1px dashed #3a3220;border-radius:10px;padding:12px 14px;margin-top:14px}
  .margin-box .mh{font-size:11px;color:var(--gold,#F5A623);color:var(--amber);font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
  /* customer-facing quote page */
  .cust-wrap{max-width:720px;margin:0 auto}
  .cust-quote{background:#fbfaf7;color:#1a1a1a;border-radius:14px;padding:34px 38px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .cust-quote .brand{font-family:"Arial Narrow",Arial,sans-serif;font-weight:800;letter-spacing:.02em;font-size:24px;text-transform:uppercase;color:#101214}
  .cust-quote .brand .a{color:var(--ember)}
  .cust-quote .cq-rule{height:3px;width:54px;background:var(--ember);border-radius:2px;margin:8px 0 20px}
  .cust-quote h2{font-size:20px;margin:0 0 4px;color:#101214}
  .cust-quote .cq-sub{color:#666;font-size:13px;margin-bottom:20px}
  .cq-line{display:flex;justify-content:space-between;padding:10px 0;border-top:1px solid #e5e2da;font-size:14px}
  .cq-line .d{color:#555;font-size:12px}
  .cq-tot{display:flex;justify-content:space-between;padding:8px 0;font-size:14px}
  .cq-tot.big{border-top:2px solid #1a1a1a;margin-top:6px;padding-top:12px;font-size:18px;font-weight:800}
  .cq-dep{background:#101214;color:#f2f0eb;border-radius:10px;padding:16px 18px;margin-top:20px;display:flex;justify-content:space-between;align-items:center}
  .cq-dep .l{font-size:12px;color:#9ba0a8;text-transform:uppercase;letter-spacing:.06em}
  .cq-dep .v{font-size:22px;font-weight:800}
  .simbar{background:var(--panel2);border:1px dashed var(--line2);border-radius:10px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .simbar .st{font-size:11px;color:var(--mut2);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
  @media(max-width:768px){ .qgrid{grid-template-columns:1fr} .qsum{position:static} .cust-quote{padding:24px 20px} }
  /* ---------- PREP ENGINE (Sprint 6) ---------- */
  .prepgrid{display:grid;grid-template-columns:1fr 1fr;gap:2px 22px}
  .prow{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--line)}
  .prow .pn2{flex:1;font-size:13px}
  .prow .pinp{width:84px;text-align:right;padding:7px 9px}
  .prow .pu2{color:var(--mut2);font-size:12px;min-width:46px}
  @media(max-width:768px){ .prepgrid{grid-template-columns:1fr} }
  .pu-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line);flex-wrap:wrap}
  .pu-main{flex:1;min-width:150px}
  @media(max-width:768px){ .pu-row .btn{flex:1} }
  @media print{ .side,.topbar,.demofab,.demopill,#viewas,.otabs{display:none!important} main{margin:0!important} .stage{padding:0!important} .btn{display:none!important} }
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .calhd{text-align:center;font-size:11px;color:var(--mut2);font-weight:700;padding:4px 0}
  .calcell{min-height:94px;border:1px solid var(--line);border-radius:6px;padding:4px;background:#16181b;overflow:hidden}
  .calcell.out{opacity:.4}
  .calcell.today{border-color:var(--ember);box-shadow:inset 0 0 0 1px var(--ember)}
  .calcell.wk{min-height:170px}
  .caldate{font-size:11px;color:var(--mut);font-weight:700;margin-bottom:3px}
  .calev{font-size:10px;line-height:1.3;padding:2px 5px;border-radius:3px;margin-bottom:2px;color:var(--ink);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .calleg{font-size:12px;padding:5px 11px;border-radius:14px;border:1px solid;background:transparent;color:var(--ink);cursor:pointer;font-weight:600}
  .calleg.off{opacity:.45}
  @media(max-width:768px){ .calcell{min-height:62px;padding:2px} .calev{font-size:9px} .calgrid{gap:2px} .caldate{font-size:10px} }
  /* ---------- RESPONSIVE (tablet + mobile) ---------- */

function startCountdowns(){

  });
}

// Roll every pre-order line item up into raw production totals, in the kitchen's own units
function forecastFor(arr,prog){
  const tot={brisket:0,pork:0,ribs:0,chicken:0,sausage:0,burntends:0,mac:0,beans:0,slaw:0};
  const add=(y,mult)=>{ if(!y)return; for(const k in y){ if(tot[k]!=null) tot[k]+=y[k]*mult; } };
  (arr||[]).forEach(o=>{
    if(Array.isArray(o.lines)&&o.lines.length){ o.lines.forEach(l=>{ const m=MENU_BY_SKU[l.sku]; if(m) add(m.yield,(+l.qty||0)); }); }
    else { const q=(+o.qty||1); if(prog==="cuban") add({pork:0.25},q); else add({brisket:0.5,pork:0.3,ribs:0.25,chicken:1},q); }
  });
  for(const k in tot) tot[k]=Math.round(tot[k]*10)/10;
  return tot;
}
function forecastMeats(){
  const tot={brisket:0,pork:0,ribs:0,chicken:0,sausage:0,burntends:0,mac:0,beans:0,slaw:0};
  [[CUBAN.orders,"cuban"],[BBQ.orders,"bbq"],[SUNDAY.orders,"bbq"]].forEach(([a,p])=>{ const f=forecastFor(a,p); for(const k in tot) tot[k]+=f[k]; });
  for(const k in tot) tot[k]=Math.round(tot[k]*10)/10;
  return tot;
}

// Auto-advancing Fire Drop dates (prototype-safe: computed from real "today", persisted nowhere)
function _nextDow(dow){ const d=new Date(); const diff=(dow-d.getDay()+7)%7; d.setDate(d.getDate()+diff); d.setHours(0,0,0,0); return d; }
function _fmtDay(d){ return d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'}); }
function fireDates(){
  const thu=_nextDow(4), fri=_nextDow(5), sat=_nextDow(6), sun=_nextDow(0);
  const cutoff=(base,days,hh)=>{ const c=new Date(base); c.setDate(c.getDate()-days); c.setHours(hh,0,0,0); return c; };
  const now=Date.now();
  const st=(c)=> now>c.getTime()?"closed":"open";
  const cCut=cutoff(thu,1,12), bCut=cutoff(fri,1,18), sCut=cutoff(sun,1,17);
  return {
    cuban:{date:thu,label:_fmtDay(thu),cutoff:"Wed 12:00 PM",status:st(cCut)},
    bbqFri:{date:fri,label:_fmtDay(fri),cutoff:"Thu 6:00 PM",status:st(bCut)},
    bbqSat:{date:sat,label:_fmtDay(sat),cutoff:"Thu 6:00 PM",status:st(bCut)},
    sunday:{date:sun,label:_fmtDay(sun),cutoff:"Sat 5:00 PM",status:st(sCut)}
  };
}

/* ---------- MASTER CALENDAR (Sprint 8 — Google-style views + color coding) ---------- */
let CAL_VIEW="month", CAL_REF=new Date();

function _calParse(str){ if(!str) return null; let d=new Date(str); if(!isNaN(d)) return d; const m=String(str).match(/([A-Za-z]{3,9})\s+(\d{1,2})/); if(m){ d=new Date(m[1]+" "+m[2]+", "+(new Date().getFullYear())); if(!isNaN(d)) return d; } return null; }
function calEvents(start,end){
  const evs=[]; const d=new Date(start); d.setHours(0,0,0,0);
  while(d<=end){ const dow=d.getDay(), dt=new Date(d);
    if(dow===4){ evs.push({date:dt,cat:"cuban",title:"Cuban Thursday pickup",kind:"program",programKey:"cuban-thu",day:"Thursday"}); evs.push({date:dt,cat:"prep",title:"Press Cubans + mojo pork",kind:"prep",prepFor:"cuban-thu"}); }

    if(dow===6) evs.push({date:dt,cat:"bbq",title:"BBQ pickup (Sat)",kind:"program",programKey:"bbq-weekend",day:"Saturday"});
    if(dow===0) evs.push({date:dt,cat:"tailgate",title:"Football Sunday pickup",kind:"program",programKey:"sunday-tailgate",day:"Sunday"});
    if(dow===6) evs.push({date:dt,cat:"prep",title:"Sunday smoke",kind:"prep",prepFor:"sunday-tailgate"});
    d.setDate(d.getDate()+1);
  }
  (db.getOrders()||[]).forEach(o=>{ const full=db.getOrder(o.id)||{}; const dd=_calParse(full.pickup||o.when); if(dd && dd>=start && dd<=end){ dd.setHours(0,0,0,0); evs.push({date:dd,cat:o.type==="Catering"?"catering":"orders",title:(o.type==="Catering"?"Catering — ":o.type+" — ")+o.cust,kind:"order",orderId:o.id}); } });

function _byDay(evs){ const m={}; evs.forEach(e=>{ const k=e.date.toDateString(); (m[k]=m[k]||[]).push(e); }); return m; }
function _calChip(e){ const c=CAL_CATMETA[e.cat].color; const chip=el('<div class="calev" style="background:'+c+'22;border-left:3px solid '+c+'">'+e.title+'</div>'); chip.onclick=(ev)=>{ ev.stopPropagation(); calDetail(e); }; return chip; }
function calTitle(){ const d=CAL_REF; if(CAL_VIEW==="month") return d.toLocaleDateString('en-US',{month:'long',year:'numeric'}); if(CAL_VIEW==="week"){ const ws=new Date(d); ws.setDate(d.getDate()-d.getDay()); const we=new Date(ws); we.setDate(ws.getDate()+6); return ws.toLocaleDateString('en-US',{month:'short',day:'numeric'})+" – "+we.toLocaleDateString('en-US',{month:'short',day:'numeric'}); } return "Next 2 weeks"; }
function calShift(dir){ const d=new Date(CAL_REF); if(CAL_VIEW==="month") d.setMonth(d.getMonth()+dir); else d.setDate(d.getDate()+7*dir); CAL_REF=d; render(); }
function scrCalendar(s){

  s.appendChild(leg);

function calMonth(s){
  const y=CAL_REF.getFullYear(), m=CAL_REF.getMonth();
  const first=new Date(y,m,1); const gs=new Date(y,m,1-first.getDay());
  const ge=new Date(gs); ge.setDate(gs.getDate()+41);
  const byd=_byDay(calEvents(gs,ge));
  const grid=el('<div class="calgrid"></div>');
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(h=>grid.appendChild(el('<div class="calhd">'+h+'</div>')));
  const today=new Date(); today.setHours(0,0,0,0);
  for(let i=0;i<42;i++){ const cd=new Date(gs); cd.setDate(gs.getDate()+i); const inM=cd.getMonth()===m, isT=cd.getTime()===today.getTime();
    const cell=el('<div class="calcell'+(inM?'':' out')+(isT?' today':'')+'"><div class="caldate">'+cd.getDate()+'</div></div>');
    const list=byd[cd.toDateString()]||[]; list.slice(0,3).forEach(e=>cell.appendChild(_calChip(e)));
    if(list.length>3) cell.appendChild(el('<div class="mut2" style="font-size:10px;padding-left:2px">+'+(list.length-3)+' more</div>'));
    grid.appendChild(cell);
  }
  s.appendChild(grid);
}
function calWeek(s){
  const ws=new Date(CAL_REF); ws.setDate(CAL_REF.getDate()-CAL_REF.getDay()); ws.setHours(0,0,0,0);
  const we=new Date(ws); we.setDate(ws.getDate()+6);
  const byd=_byDay(calEvents(ws,we));
  const grid=el('<div class="calgrid"></div>');
  const today=new Date(); today.setHours(0,0,0,0);
  const dn=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  for(let i=0;i<7;i++){ const cd=new Date(ws); cd.setDate(ws.getDate()+i); const isT=cd.getTime()===today.getTime();
    const cell=el('<div class="calcell wk'+(isT?' today':'')+'"><div class="caldate">'+dn[i]+' '+cd.getDate()+'</div></div>');
    (byd[cd.toDateString()]||[]).forEach(e=>cell.appendChild(_calChip(e)));
    grid.appendChild(cell);
  }
  s.appendChild(grid);
}
function calAgenda(s){
  const start=new Date(); start.setHours(0,0,0,0); const end=new Date(start); end.setDate(start.getDate()+13);
  const evs=calEvents(start,end).sort((a,b)=>a.date-b.date); const byd=_byDay(evs);
  const keys=Object.keys(byd).sort((a,b)=>new Date(a)-new Date(b));
  keys.forEach(k=>{ const card=el('<div class="card" style="margin-bottom:10px"><h3 style="font-size:14px">'+new Date(k).toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})+'</h3></div>');

    s.appendChild(card);
  });
  if(!keys.length) s.appendChild(el('<div class="csub">No events in the next two weeks with the selected filters.</div>'));
}

function searchIndex(){

  db.getLeads().forEach(l=>ix.push({type:"lead",id:l.id,label:l.name,sub:"Lead · "+l.stage}));

  db.getOrders().forEach(o=>ix.push({type:"order",id:o.id,label:o.id+" · "+o.cust,sub:"Order · "+o.status}));

/* ---- existence guard (prevents broken deep links / dead activity items) ---- */
function objExists(type,id){ switch(type){
  case "order": return !!(ORD[id]||ORDERS.find(o=>o.id===id));
  case "quote": return !!QUOTES[id];
  case "lead": return !!LEADS.find(l=>l.id===id);
  case "customer": return !!CUSTOMERS.find(c=>c.id===id);
  case "program": return !!PROGRAMS[id];
  case "window": return !!WINDOWS[id];
  case "payment": return !!PAYMENTS.find(p=>p.id===id);
  case "communication": return !!COMMS.find(m=>m.id===id);
  case "batch": return !!BATCHES.find(b=>b.id===id);
  case "campaign": return !!CAMPAIGNS.find(c=>c.id===id);
  case "review": return !!REVIEWS.find(r=>r.id===id);
  case "task": return !!TASKS_G.find(t=>t.id===id);
  default: return false; } }

/* ---- toast (feedback for actions & stubbed buttons) ---- */
function toast(msg){ let t=document.getElementById("fdtoast"); if(!t){ t=el('<div id="fdtoast" class="toast"></div>'); document.body.appendChild(t); } t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }

/* ---- localStorage persistence ---- */
const LS_KEY="firedrop_os_v5";
function snapshot(){ return { v:5, ORDERS, ORD, QUOTES, QNUM, ONUM, ACTIVITY, LEADS, TASKS_G, PAYMENTS, KAmendAcked,
  CUBAN:{sold:CUBAN.sold,revenue:CUBAN.revenue,orders:CUBAN.orders},
  BBQ:{sold:BBQ.sold,revenue:BBQ.revenue,orders:BBQ.orders},
  BATCHES, PREP, CATALOG, KNOTES, SAMPLERS, MENU, USERS,
  SUNDAY:{sold:SUNDAY.sold,revenue:SUNDAY.revenue,orders:SUNDAY.orders} }; }
function saveState(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(snapshot())); }catch(e){} }
let _saveT; function scheduleSave(){ clearTimeout(_saveT); _saveT=setTimeout(saveState,300); }
function loadState(){ try{
  const raw=localStorage.getItem(LS_KEY); if(!raw) return; const s=JSON.parse(raw); if(!s||s.v!==5) return;
  const repArr=(a,src)=>{ if(!Array.isArray(src))return; a.length=0; src.forEach(x=>a.push(x)); };
  const repObj=(o,src)=>{ if(!src)return; Object.keys(o).forEach(k=>delete o[k]); Object.assign(o,src); };
  repArr(ORDERS,s.ORDERS); repObj(ORD,s.ORD); repObj(QUOTES,s.QUOTES); repArr(ACTIVITY,s.ACTIVITY);
  repArr(LEADS,s.LEADS); repArr(TASKS_G,s.TASKS_G); repArr(PAYMENTS,s.PAYMENTS); repArr(BATCHES,s.BATCHES);
  if(typeof s.QNUM==="number")QNUM=s.QNUM; if(typeof s.ONUM==="number")ONUM=s.ONUM; KAmendAcked=!!s.KAmendAcked;
  if(s.CUBAN){ CUBAN.sold=s.CUBAN.sold; CUBAN.revenue=s.CUBAN.revenue; repArr(CUBAN.orders,s.CUBAN.orders); }
  if(s.BBQ){ BBQ.sold=s.BBQ.sold; BBQ.revenue=s.BBQ.revenue; repArr(BBQ.orders,s.BBQ.orders); }
  if(s.PREP){ repObj(PREP.prep, s.PREP.prep); repObj(PREP.raw, s.PREP.raw); }
  if(Array.isArray(s.CATALOG)){ s.CATALOG.forEach(g=>{ (g.items||[]).forEach(si=>{ CATALOG.forEach(cg=>cg.items.forEach(it=>{ if(it.id===si.id){ if(si.par!=null)it.par=si.par; if(si.active!=null)it.active=si.active; } })); }); }); }
  if(typeof s.KNOTES==="string") KNOTES=s.KNOTES;
  if(Array.isArray(s.SAMPLERS)){ s.SAMPLERS.forEach((ss,i)=>{ if(SAMPLERS[i]){ if(ss.price!=null)SAMPLERS[i].price=ss.price; if(ss.active!=null)SAMPLERS[i].active=ss.active; } }); }
  if(Array.isArray(s.MENU)){ s.MENU.forEach(g=>(g.items||[]).forEach(si=>{ const m=MENU_BY_SKU[si.sku]; if(m){ if(si.price!=null)m.price=si.price; if(si.active!=null)m.active=si.active; } })); }
  if(Array.isArray(s.USERS)) repArr(USERS,s.USERS);
  if(s.SUNDAY){ SUNDAY.sold=s.SUNDAY.sold; SUNDAY.revenue=s.SUNDAY.revenue; repArr(SUNDAY.orders,s.SUNDAY.orders); }
}catch(e){ console.warn("FireDrop: load failed, using defaults",e); } }

/* Cross-tab station sync (prototype-safe, localStorage only). True cross-DEVICE sync
   is the deferred Supabase step; this keeps multiple tabs/windows on one machine live. */
let _extPending=false;
window.addEventListener("storage",(e)=>{
  if(e.key!==LS_KEY || !e.newValue) return;
  const ae=document.activeElement;
  if(ae && /^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName)){ _extPending=true; return; } // don't clobber typing
  loadState(); if(typeof render==="function") render(); if(typeof toast==="function") toast("↻ Synced from another station");
});
window.addEventListener("focusout",()=>{ if(_extPending){ _extPending=false; setTimeout(()=>{ loadState(); if(typeof render==="function") render(); },50); } });

    const stTd=el('<td></td>'); const btn=el('<button class="btn sm '+(active?'':'ghost')+'">'+(active?'Active':'Inactive')+'</button>'); btn.onclick=()=>{ SAMPLERS[i].active=!active; scheduleSave(); showPrepSaved(); render(); }; stTd.appendChild(btn); tr.appendChild(stTd);

function initDemoUI(){ const tb=document.querySelector(".topbar"); if(tb&&!document.getElementById("demopill")){ const pill=el('<span id="demopill" class="demopill">● DEMO MODE</span>'); tb.insertBefore(pill, tb.firstChild); } if(!document.getElementById("demoFab")){ const fab=el('<button id="demoFab" class="demofab">▷ Demo tools</button>'); fab.onclick=openDemoTools; document.body.appendChild(fab); } }

/* =========================================================
   DATA ACCESS LAYER (Sprint 5A)
   One seam over the store. Today: in-memory + localStorage.
   Later: swap ONLY these internals for Supabase — screens call db.* and never
   touch global arrays directly, so no UI rewrite is needed.
   ========================================================= */
/* =========================================================
   SUPABASE BACKEND (Sprint 5C) — reads only, one object at a time.
   SAFE BY DEFAULT: with url/anon blank, mode stays "demo" (localStorage) and
   the app behaves exactly as before. Fill url+anon (its OWN firedrop-staging
   project — never anything Manus uses) to go live. RLS requires an authenticated
   sign-in, so live reads run after doLogin() authenticates a staff user.
   ========================================================= */
const SUPA = { url:"", anon:"", token:"", mode:"demo" };   // mode: "demo" | "staging"
function _supaBase(){ return SUPA.url.replace(/\/$/,""); }
async function supaSignIn(email,password){
  const r=await fetch(_supaBase()+"/auth/v1/token?grant_type=password",{method:"POST",headers:{apikey:SUPA.anon,"Content-Type":"application/json"},body:JSON.stringify({email,password})});
  if(!r.ok) throw new Error("Auth failed ("+r.status+")");
  const j=await r.json(); SUPA.token=j.access_token||""; return j;
}
async function supaGet(path){
  const r=await fetch(_supaBase()+"/rest/v1/"+path,{headers:{apikey:SUPA.anon,Authorization:"Bearer "+(SUPA.token||SUPA.anon),Accept:"application/json"}});
  if(!r.ok) throw new Error("Supabase "+r.status+" on "+path);
  return r.json();
}
function _mapCustomer(c){ return { id:c.id, name:c.name, type:c.company?"Catering":"Catering", phone:c.phone||"—", email:c.email||"—", since:"", spend:+c.lifetime_value||0, orders:0, tags:Array.isArray(c.tags)?c.tags:[], timeline:[] }; }
async function hydrateCustomers(){
  const rows=await supaGet("customers?select=*&order=name.asc");
  if(Array.isArray(rows)){ CUSTOMERS.length=0; rows.forEach(c=>CUSTOMERS.push(_mapCustomer(c))); }
  return Array.isArray(rows)?rows.length:0;
}
async function doLogin(){
  const email=((document.getElementById("lg-email")||{}).value||"").trim();
  const pass=((document.getElementById("lg-pass")||{}).value||"");
  if(SUPA.mode==="staging" && SUPA.url && SUPA.anon){
    try{
      await supaSignIn(email,pass);
      const n=await hydrateCustomers();
      enterApp();
      if(typeof toast==="function") toast("Signed in to staging — "+n+" live customers");
      return;
    }catch(e){ console.warn("Staging login failed:",e); if(typeof toast==="function") toast("Staging sign-in failed — using demo data"); }
  }
  enterApp(); // demo path — unchanged from before
}
function _orderRow(r){ const kitchen = r.production==="Picked up"||r.production==="Completed"?"Done": r.production==="Scheduled"?"Scheduled":"Queued"; return {id:r.id,cust:r.customer,type:r.program,status:r.status,amount:r.total,when:r.pickup,kitchen}; }
const db = {
  /* Customers */
  getCustomers(){ return CUSTOMERS; },
  getCustomer(id){ return CUSTOMERS.find(c=>c.id===id)||null; },
  /* Supabase staging control (Sprint 5C) — reads only, demo stays default */
  setStaging(url,anon){ SUPA.url=url||""; SUPA.anon=anon||""; SUPA.mode=(url&&anon)?"staging":"demo"; const m=document.getElementById("lg-mode"); if(m)m.textContent=SUPA.mode==="staging"?"Staging · live Supabase · sign in with a staff account":"Prototype · sample data · demo mode"; return SUPA.mode; },
  useDemo(){ SUPA.mode="demo"; SUPA.token=""; },
  dataMode(){ return SUPA.mode; },
  async refreshCustomers(){ if(SUPA.mode!=="staging") return 0; const n=await hydrateCustomers(); if(typeof render==="function") render(); return n; },
  updateCustomer(id,data){ const c=CUSTOMERS.find(x=>x.id===id); if(c)Object.assign(c,data); db.saveState(); return c; },
  /* Leads */
  getLeads(){ return LEADS; },
  getLead(id){ return LEADS.find(l=>l.id===id)||null; },
  createLead(data){ LEADS.unshift(data); db.saveState(); return data; },
  updateLead(id,data){ const l=LEADS.find(x=>x.id===id); if(l)Object.assign(l,data); db.saveState(); return l; },
  /* Quotes */
  getQuotes(){ return Object.values(QUOTES); },
  getQuote(id){ return QUOTES[id]||null; },
  createQuote(data){ QUOTES[data.key]=data; db.saveState(); return data; },
  updateQuote(id,data){ const q=QUOTES[id]; if(q)Object.assign(q,data); db.saveState(); return q; },
  /* Orders */
  getOrders(){ return ORDERS; },
  getOrder(id){ return getOrder(id); },
  createOrder(rich){ ORD[rich.id]=rich; if(!ORDERS.find(r=>r.id===rich.id)) ORDERS.unshift(_orderRow(rich)); db.saveState(); return rich; },
  updateOrder(id,data){ const o=ORD[id]||getOrder(id); if(o)Object.assign(o,data); const row=ORDERS.find(r=>r.id===id); if(row){ if(data.status)row.status=data.status; if(data.production)row.kitchen=_orderRow(o).kitchen; } db.saveState(); return o; },
  addPayment(orderId,data){ const o=getOrder(orderId); if(!o)return null; const amt=Math.min(data.amount, o.total-o.paid); o.paid+=amt; (o.payments=o.payments||[]).unshift({when:data.when||"just now",amt,method:data.method||"Stripe",type:data.type||"payment"}); (o.timeline=o.timeline||[]).push({who:"human",title:"Payment received",note:money(amt)+" · "+(data.method||"Stripe"),time:"just now",done:true}); PAYMENTS.unshift({id:_uid("PAY"),amount:amt,method:data.method||"Stripe",status:"Captured",orderId:orderId,customer:o.customer}); db.addActivityEvent({ot:"order",id:orderId,verb:"Payment received",label:o.customer+" · "+money(amt),time:"just now"}); db.saveState(); return o; },
  /* Payments */
  getPayments(){ return PAYMENTS; },
  getPayment(id){ return PAYMENTS.find(p=>p.id===id)||null; },
  /* Tasks */
  getTasks(){ return TASKS_G; },
  getTask(id){ return TASKS_G.find(t=>t.id===id)||null; },
  updateTask(id,data){ const t=TASKS_G.find(x=>x.id===id); if(t)Object.assign(t,data); db.saveState(); return t; },
  /* Communications */
  getCommunications(){ return COMMS; },
  getCommunication(id){ return COMMS.find(c=>c.id===id)||null; },
  /* Programs & windows */
  getPrograms(){ return Object.values(PROGRAMS); },
  getProgram(id){ return PROGRAMS[id]||null; },
  getProgramWindows(){ return Object.values(WINDOWS); },
  getProgramWindow(id){ return WINDOWS[id]||null; },
  /* Kitchen prep engine (Sprint 6) */
  getCatalog(){ return CATALOG; },
  getPrep(){ return PREP; },
  setPrepCount(kind,id,val){ if(!PREP[kind])PREP[kind]={}; PREP[kind][id]=val; scheduleSave(); return val; },
  setCatalogItem(id,field,val){ CATALOG.forEach(g=>g.items.forEach(it=>{ if(it.id===id) it[field]=val; })); scheduleSave(); },
  /* Front counter pre-orders (aggregated from programs) */
  getPreorders(){ const list=[];
    (CUBAN.orders||[]).forEach(o=>list.push({o,program:"Cuban",programKey:"cuban-thu",day:"Thursday",items:(lineSummary(o)||(o.qty+" Cuban"+(o.qty>1?"s":""))),slot:o.slot}));
    (BBQ.orders||[]).forEach(o=>{ const day=(o.slot||"").indexOf("Sat")>=0?"Saturday":"Friday"; list.push({o,program:"BBQ",programKey:"bbq-weekend",day,items:(lineSummary(o)||o.item||(o.qty+" family pack"+(o.qty>1?"s":""))),slot:o.slot}); });
    (SUNDAY.orders||[]).forEach(o=>list.push({o,program:"Tailgate",programKey:"sunday-tailgate",day:"Sunday",items:(lineSummary(o)||(o.qty+" tailgate pack")),slot:o.slot}));
    return list; },
  togglePreorder(o,field){ o[field]=!o[field]; scheduleSave(); return o[field]; },
  addPreorder(programKey,data){ const prog = programKey==="bbq-weekend"?BBQ:programKey==="sunday-tailgate"?SUNDAY:CUBAN; prog.orders.unshift(data); const q=(+data.qty||1); prog.sold+=q; if(data.paid) prog.revenue+=prog.price*q; scheduleSave(); return data; },
  /* Marketing / reviews / batches (read for now) */
  getCampaigns(){ return CAMPAIGNS; },
  getReviews(){ return REVIEWS; },
  getBatches(){ return BATCHES; },
  /* Activity */
  getActivityEvents(){ return ACTIVITY; },
  addActivityEvent(data){ if(!data.time)data.time="just now"; ACTIVITY.unshift(data); scheduleSave(); return data; },
  /* Settings (static config until backend) */
  getSettings(){ return { roles:["owner","catering_manager","kitchen","counter"], programs:Object.keys(PROGRAMS), dataMode:"demo" }; },
  saveSettings(){ db.saveState(); },
  /* Persistence + demo */
  saveState(){ saveState(); },
  scheduleSave(){ scheduleSave(); },
  loadState(){ loadState(); },
  resetDemoData(){ demoReset(); }
};
window.db = db;

/* ---- boot: restore state before first render; wire demo UI after login ---- */
loadState();
(function(){ const prev=window.enterApp; window.enterApp=function(){ prev(); initDemoUI(); }; })();
</script>
