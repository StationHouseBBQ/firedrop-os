<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FireDrop OS — Station House BBQ</title>
<style>
  :root{
    /* Firehouse Dark — spec §1.1 tokens */
    --bg:#101214; --bg2:#141619; --panel:#17191C; --panel2:#1E2126; --line:#262a30; --line2:#333842;
    --ink:#F2F0EB; --mut:#9BA0A8; --mut2:#6E747D;
    --ember:#E8590C; --ember2:#F5760C; --emberdim:#2a1810;
    --red:#E5484D; --reddim:#2c1416; --green:#46A758; --greendim:#122419; --blue:#4C8DFF;
    --amber:#F5A623; --amberdim:#2a2109; --smoke:#6E747D;
    --radius:8px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden;font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#2a2f3a;border-radius:6px}
  .hide{display:none!important}

  /* ---------- LOGIN ---------- */
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(1200px 600px at 50% -10%,#1a1206,#0d0e11 60%)}
  .login-card{width:380px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:36px 32px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .mark{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;letter-spacing:-.02em}
  .drop{width:26px;height:26px;border-radius:50% 50% 50% 0;background:linear-gradient(160deg,var(--ember2),var(--ember));transform:rotate(45deg);box-shadow:0 0 18px rgba(255,106,26,.45)}
  .login-card h1{font-size:22px;margin:22px 0 4px;letter-spacing:-.02em}
  .login-card p{color:var(--mut);font-size:13px;margin:0 0 22px}
  label.f{display:block;font-size:12px;color:var(--mut);margin:14px 0 6px;letter-spacing:.02em}
  input.f{width:100%;background:#0f1116;border:1px solid var(--line2);color:var(--ink);border-radius:9px;padding:11px 12px;font-size:14px}
  input.f:focus{outline:none;border-color:var(--ember)}

  /* ---------- APP SHELL ---------- */
  #app{display:flex;height:100vh}
  nav.side{width:230px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:16px 12px}
  .side .brand{display:flex;align-items:center;gap:9px;padding:6px 8px 16px;font-weight:800;font-size:17px;letter-spacing:-.02em}
  .side .brand .drop{width:20px;height:20px}
  .navitem{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:var(--mut);font-size:14px;font-weight:500;margin-bottom:2px;border:1px solid transparent}
  .navitem:hover{background:var(--panel);color:var(--ink)}
  .navitem.active{background:var(--panel2);color:var(--ink);border-color:var(--line2)}
  .navitem.active .ic{color:var(--ember)}
  .navitem .ic{width:18px;text-align:center;color:var(--mut2);font-size:15px}
  .navitem .badge{margin-left:auto;background:var(--emberdim);color:var(--ember2);font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px}
  .side .spacer{flex:1}
  .rolebox{border-top:1px solid var(--line);padding-top:12px;margin-top:8px}
  .rolebox .lbl{font-size:11px;color:var(--mut2);padding:0 8px 6px;text-transform:uppercase;letter-spacing:.1em}
  .roletoggle{display:flex;background:#0f1116;border:1px solid var(--line2);border-radius:9px;padding:3px}
  .roletoggle button{flex:1;background:transparent;border:none;color:var(--mut);font-size:12px;font-weight:600;padding:7px;border-radius:6px}
  .roletoggle button.on{background:var(--panel2);color:var(--ink)}

  main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
  .topbar{height:60px;flex-shrink:0;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 24px;background:var(--bg)}
  .search{flex:1;max-width:420px;position:relative}
  .search input{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:9px 12px 9px 34px;font-size:13px}
  .search input:focus{outline:none;border-color:var(--line2)}
  .search .si{position:absolute;left:11px;top:8px;color:var(--mut2)}
  .topbar .date{margin-left:auto;color:var(--mut);font-size:13px}
  .topbar .who{display:flex;align-items:center;gap:9px;font-size:13px}
  .avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(160deg,var(--ember2),var(--ember));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#231000}

  .stage{flex:1;overflow:auto;padding:26px 28px}
  .page-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:22px}
  .page-head h1{font-size:23px;margin:0 0 3px;letter-spacing:-.02em}
  .page-head .sub{color:var(--mut);font-size:13px}
  .page-head .primary{margin-left:auto}

  /* buttons */
  .btn{border:1px solid var(--line2);background:var(--panel2);color:var(--ink);padding:9px 15px;border-radius:9px;font-size:13px;font-weight:600}
  .btn:hover{border-color:var(--mut2)}
  .btn.primary{background:var(--ember);border-color:var(--ember);color:#231000}
  .btn.primary:hover{background:var(--ember2)}
  .btn.sm{padding:6px 11px;font-size:12px}
  .btn.ghost{background:transparent}

  /* cards / grid */
  .grid{display:grid;gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .card h3{margin:0 0 3px;font-size:14px;letter-spacing:-.01em}
  .card .csub{color:var(--mut);font-size:12px;margin-bottom:14px}
  .kpi{font-size:28px;font-weight:800;letter-spacing:-.03em}
  .kpi.sm{font-size:22px}
  .muted{color:var(--mut)} .mut2{color:var(--mut2)}
  .delta{font-size:12px;font-weight:700} .up{color:var(--green)} .down{color:var(--red)}
  .row{display:flex;align-items:center;gap:10px}
  .between{display:flex;align-items:center;justify-content:space-between}
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;border:1px solid var(--line2);color:var(--mut)}
  .tag.ember{background:var(--emberdim);color:var(--ember2);border-color:transparent}
  .tag.amber{background:var(--amberdim);color:var(--amber);border-color:transparent}
  .tag.green{background:var(--greendim);color:var(--green);border-color:transparent}
  .tag.red{background:var(--reddim);color:var(--red);border-color:transparent}
  .tag.blue{background:#12203a;color:var(--blue);border-color:transparent}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--mut2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:0 12px 10px}
  td{padding:12px;border-top:1px solid var(--line)}
  tr.clk:hover td{background:var(--panel2);cursor:pointer}
  .progress{height:8px;background:#0f1116;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--ember),var(--ember2))}

  /* briefing */
  .briefing{background:linear-gradient(120deg,#1a1206,var(--panel) 55%);border:1px solid var(--line2);border-radius:14px;padding:20px 22px;margin-bottom:20px}
  .briefing .bt{font-size:12px;color:var(--ember2);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .prio{display:flex;gap:13px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--line)}
  .prio:first-of-type{border-top:none}
  .prionum{width:22px;height:22px;flex-shrink:0;border-radius:6px;background:var(--emberdim);color:var(--ember2);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .prio .pt{font-size:14px;font-weight:600} .prio .pd{font-size:12.5px;color:var(--mut);margin-top:2px}
  .prio .pa{margin-left:auto}

  /* pipeline */
  .board{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px}
  .col{min-width:230px;flex:1}
  .colhead{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--mut);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
  .colhead .ct{margin-left:auto;background:var(--panel2);color:var(--mut);border-radius:20px;padding:0 8px;font-size:11px}
  .lead{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:9px}
  .lead:hover{border-color:var(--line2);cursor:pointer}
  .lead .ln{font-weight:600;font-size:13.5px}
  .lead .lm{font-size:12px;color:var(--mut);margin:3px 0 8px}
  .sla{font-size:11px;font-weight:700}
  .sla.ok{color:var(--mut)} .sla.warn{color:var(--amber)} .sla.late{color:var(--red)}

  /* detail drawer */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;justify-content:flex-end;z-index:50}
  .drawer{width:560px;max-width:94vw;background:var(--bg2);height:100%;overflow:auto;border-left:1px solid var(--line2);animation:slide .18s ease}
  @keyframes slide{from{transform:translateX(30px);opacity:.4}to{transform:none;opacity:1}}
  .drawer .dh{position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--line);padding:18px 22px;z-index:2}
  .drawer .db{padding:20px 22px}
  .x{float:right;background:transparent;border:none;color:var(--mut);font-size:20px}
  .field{margin-bottom:12px}.field .fl{font-size:11px;color:var(--mut2);text-transform:uppercase;letter-spacing:.05em}.field .fv{font-size:14px;margin-top:2px}
  .stepper{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0 4px}
  .step{font-size:11px;padding:4px 9px;border-radius:20px;background:#0f1116;border:1px solid var(--line);color:var(--mut2)}
  .step.done{background:var(--greendim);color:var(--green);border-color:transparent}
  .step.cur{background:var(--ember);color:#231000;border-color:transparent;font-weight:700}
  .timeline{border-left:2px solid var(--line2);margin-left:6px;padding-left:16px}
  .tl{position:relative;padding:0 0 16px}
  .tl::before{content:"";position:absolute;left:-23px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--ember)}
  .tl .tt{font-size:13px;font-weight:600}.tl .td{font-size:12px;color:var(--mut)}.tl .tm{font-size:11px;color:var(--mut2);margin-top:1px}

  /* kitchen */
  .kmode .stage{padding:24px 30px}
  .kbig{font-size:15px}
  .prodcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;text-align:center}
  .prodcard .pn{font-size:13px;color:var(--mut);font-weight:600}
  .prodcard .pq{font-size:40px;font-weight:800;letter-spacing:-.03em;margin:6px 0}
  .prodcard .pu{font-size:12px;color:var(--mut2)}
  .prodcard.short{border-color:var(--red);background:var(--reddim)}
  .checkitem{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;font-size:15px;background:var(--panel)}
  .checkbox{width:24px;height:24px;border-radius:6px;border:2px solid var(--line2);flex-shrink:0}
  .checkitem.done{opacity:.5}
  .checkitem.done .checkbox{background:var(--green);border-color:var(--green)}
  .queue{display:flex;align-items:center;gap:14px;padding:15px 18px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;background:var(--panel);font-size:15px}
  .slot{font-weight:800;font-size:17px;color:var(--ember2);min-width:74px}

  /* ---------- UNIVERSAL OBJECT ENGINE (Sprint 4) ---------- */
  .ubrief{background:linear-gradient(120deg,#101a16,var(--panel) 60%);border:1px solid #1e3a2c;border-radius:10px;padding:14px 16px;margin-bottom:6px}
  .ubrief .uh{font-size:11px;color:var(--green);font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
  .ubrief .ur{display:flex;gap:10px;padding:5px 0;font-size:13px}
  .ubrief .ur .k{color:var(--mut2);min-width:130px;font-size:12px}
  .rchip{display:inline-flex;flex-direction:column;gap:1px;border:1px solid var(--line2);border-radius:8px;padding:8px 11px;margin:0 6px 6px 0;cursor:pointer;background:#141519}
  .rchip:hover{border-color:var(--ember)}
  .rchip .rb{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--ember2)}
  .rchip .rt{font-size:12.5px;font-weight:600} .rchip .rs{font-size:11px;color:var(--mut2)}
  .deeplink{display:flex;align-items:center;justify-content:space-between;gap:10px;border-top:1px solid var(--line);margin-top:18px;padding-top:12px;font-size:11px;color:var(--mut2);flex-wrap:wrap}
  .tbtn{background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--mut);padding:7px 11px;font-size:13px;cursor:pointer;white-space:nowrap}
  .tbtn:hover{color:var(--ink);border-color:var(--line2)}
  .pal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:80;display:flex;justify-content:center;align-items:flex-start;padding-top:11vh}
  .pal{width:600px;max-width:92vw;background:var(--panel);border:1px solid var(--line2);border-radius:14px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .pal input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--ink);padding:16px 18px;font-size:16px;outline:none}
  .pal .res{max-height:52vh;overflow:auto}
  .pal .r{display:flex;align-items:center;gap:12px;padding:11px 18px;cursor:pointer;border-bottom:1px solid #191b1f}
  .pal .r:hover,.pal .r.sel{background:var(--panel2)}
  .pal .r .rt{font-weight:600;font-size:14px} .pal .r .rs{font-size:12px;color:var(--mut2);margin-left:auto}
  .pal .rb{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--ember2);border:1px solid var(--line2);border-radius:4px;padding:2px 6px}
  .pal .hint{padding:12px 18px;color:var(--mut2);font-size:12px}
  /* ---------- QUOTE COMPOSER (Sprint 3) ---------- */
  .qgrid{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;align-items:start}
  .qsum{position:sticky;top:12px}
  .pkg{border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:9px;cursor:pointer}
  .pkg:hover{border-color:var(--line2)}
  .pkg.on{border-color:var(--ember);background:var(--emberdim)}
  .pkg .pn{font-weight:700;font-size:14px} .pkg .pd{font-size:12px;color:var(--mut);margin-top:2px}
  .pkg .pp{font-weight:800;color:var(--ember2)}
  .qline{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line);font-size:13px}
  .stepper2{display:flex;align-items:center;gap:8px;margin-left:auto}
  .stepper2 button{width:26px;height:26px;border-radius:6px;border:1px solid var(--line2);background:#17171b;color:var(--ink);font-weight:800;line-height:1}
  .qin{background:#0f1116;border:1px solid var(--line2);color:var(--ink);border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit}
  .sumrow{display:flex;justify-content:space-between;padding:7px 0;font-size:14px}
  .sumrow.big{border-top:1px solid var(--line2);margin-top:4px;padding-top:11px;font-size:16px;font-weight:800}
  .margin-box{background:#12130f;border:1px dashed #3a3220;border-radius:10px;padding:12px 14px;margin-top:14px}
  .margin-box .mh{font-size:11px;color:var(--gold,#F5A623);color:var(--amber);font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
  /* customer-facing quote page */
  .cust-wrap{max-width:720px;margin:0 auto}
  .cust-quote{background:#fbfaf7;color:#1a1a1a;border-radius:14px;padding:34px 38px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .cust-quote .brand{font-family:"Arial Narrow",Arial,sans-serif;font-weight:800;letter-spacing:.02em;font-size:24px;text-transform:uppercase;color:#101214}
  .cust-quote .brand .a{color:var(--ember)}
  .cust-quote .cq-rule{height:3px;width:54px;background:var(--ember);border-radius:2px;margin:8px 0 20px}
  .cust-quote h2{font-size:20px;margin:0 0 4px;color:#101214}
  .cust-quote .cq-sub{color:#666;font-size:13px;margin-bottom:20px}
  .cq-line{display:flex;justify-content:space-between;padding:10px 0;border-top:1px solid #e5e2da;font-size:14px}
  .cq-line .d{color:#555;font-size:12px}
  .cq-tot{display:flex;justify-content:space-between;padding:8px 0;font-size:14px}
  .cq-tot.big{border-top:2px solid #1a1a1a;margin-top:6px;padding-top:12px;font-size:18px;font-weight:800}
  .cq-dep{background:#101214;color:#f2f0eb;border-radius:10px;padding:16px 18px;margin-top:20px;display:flex;justify-content:space-between;align-items:center}
  .cq-dep .l{font-size:12px;color:#9ba0a8;text-transform:uppercase;letter-spacing:.06em}
  .cq-dep .v{font-size:22px;font-weight:800}
  .simbar{background:var(--panel2);border:1px dashed var(--line2);border-radius:10px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .simbar .st{font-size:11px;color:var(--mut2);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
  @media(max-width:768px){ .qgrid{grid-template-columns:1fr} .qsum{position:static} .cust-quote{padding:24px 20px} }
  /* ---------- RESPONSIVE (tablet + mobile) ---------- */
  @media(max-width:1024px){ .grid{grid-template-columns:repeat(2,1fr)!important} }
  @media(max-width:768px){
    #app{flex-direction:column}
    nav.side{width:100%;flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line);padding:8px 10px;gap:6px;align-items:center}
    nav.side .brand{padding:4px 8px 4px 4px;white-space:nowrap;font-size:15px}
    #nav{display:flex;gap:6px;flex:1}
    .navitem{margin-bottom:0;white-space:nowrap;padding:8px 11px}
    .navitem .badge{margin-left:6px}
    .side .spacer,.rolebox{display:none}
    .grid{grid-template-columns:1fr!important}
    .topbar{padding:0 14px;gap:10px} .topbar .date{display:none} .search{max-width:none}
    .who span{display:none}
    .stage{padding:16px 14px}
    .drawer{width:100%}
    .page-head{flex-wrap:wrap} .page-head .primary{margin-left:0;margin-top:6px}
    .col{min-width:200px}
    .prodcard .pq{font-size:34px}
  }
  /* ---------- ORDER RECORD (Sprint 2) ---------- */
  .ord-head{background:linear-gradient(120deg,#1a1206,var(--panel) 62%);border:1px solid var(--line2);border-radius:14px;padding:20px 22px;margin-bottom:14px}
  .ord-title{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-top:10px}
  .ord-money{display:flex;gap:30px;margin:15px 0 14px;flex-wrap:wrap}
  .ord-money .m .l{font-size:11px;color:var(--mut2);text-transform:uppercase;letter-spacing:.08em}
  .ord-money .m .v{font-size:27px;font-weight:800;letter-spacing:-.02em;margin-top:2px}
  .ord-facts{display:flex;flex-wrap:wrap;gap:26px}
  .ord-facts .f .l{font-size:10px;color:var(--mut2);text-transform:uppercase;letter-spacing:.08em}
  .ord-facts .f > div:last-child{font-size:13px;margin-top:2px}
  .otabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:18px;flex-wrap:wrap}
  .otab{padding:10px 15px;font-size:13px;font-weight:600;color:var(--mut);border-bottom:2px solid transparent;cursor:pointer}
  .otab:hover{color:var(--ink)}
  .otab.on{color:var(--ink);border-bottom-color:var(--ember)}
  .lockbar{display:flex;align-items:center;gap:10px;background:#141518;border:1px solid var(--line2);border-left:3px solid var(--smoke);border-radius:10px;padding:12px 16px;margin-bottom:16px;color:var(--mut);font-size:13px}
  .ai-card{background:linear-gradient(120deg,#101a16,var(--panel) 60%);border:1px solid #1e3a2c;border-radius:12px;padding:18px 20px;margin-bottom:16px}
  .ai-card .ah{font-size:12px;color:var(--green);font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .ai-row{display:flex;gap:11px;padding:9px 0;border-top:1px solid var(--line);font-size:13px}
  .ai-row:first-of-type{border-top:none}
  .ai-row .k{color:var(--mut2);min-width:120px;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  .amend{border:1px solid var(--line);border-left:3px solid var(--blue);border-radius:8px;padding:11px 13px;margin-bottom:8px;font-size:13px}
  .diff-old{text-decoration:line-through;color:var(--mut2)} .diff-new{color:var(--blue);font-weight:600}

function startCountdowns(){

  });
}

function quoteTotals(q){
  const pkg=q.package?q.package.perHead*q.headcount:0, pkgCost=q.package?q.package.cost*q.headcount:0;
  let ala=0,alaCost=0; (q.alacarte||[]).forEach(a=>{ala+=a.price*a.qty; alaCost+=a.cost*a.qty;});
  const fees=(q.deliveryFee||0)+(q.setupFee||0);
  const subtotal=pkg+ala+fees, tax=Math.round(subtotal*q.taxRate), total=subtotal+tax;
  const deposit=Math.round(total*q.depositPct), cost=pkgCost+alaCost+Math.round(fees*0.35);

function openObject(type,id){
  try{ history.replaceState(null,"","#"+type+"/"+encodeURIComponent(id)); }catch(e){}
  closePalette(); closeActivity();
  if(type==="order") return openOrder(id);

  else if(type==="order"){ const o=getOrder(id); push("customer",custIdByName(o.customer),o.customer,"Customer"); PAYMENTS.filter(p=>p.orderId===id).forEach(p=>push("payment",p.id,money(p.amount),p.method)); TASKS_G.filter(t=>t.orderId===id).forEach(t=>push("task",t.id,t.t,t.due)); COMMS.filter(m=>m.orderId===id).forEach(m=>push("communication",m.id,m.title,m.channel)); }
  else if(type==="program"){ const p=PROGRAMS[id]; Object.values(WINDOWS).filter(w=>w.program===id).forEach(w=>push("window",w.id,w.label,"Window")); BATCHES.filter(b=>b.program===id).forEach(b=>push("batch",b.id,b.item,b.qty)); }
  else if(type==="window"){ const w=WINDOWS[id]||{}; push("program",w.program,progName(w.program),"Program"); BATCHES.filter(b=>b.program===w.program).forEach(b=>push("batch",b.id,b.item,b.status)); }
  else if(type==="payment"){ const p=PAYMENTS.find(x=>x.id===id)||{}; push("order",p.orderId,p.orderId,"Order"); push("customer",custIdByName(p.customer),p.customer,"Customer"); push("lead",p.leadId,p.leadId,"Lead"); }
  else if(type==="communication"){ const m=COMMS.find(x=>x.id===id)||{}; push("customer",custIdByName(m.customer),m.customer,"Customer"); push("order",m.orderId,m.orderId,"Order"); push("lead",m.leadId,m.leadId,"Lead"); }
  else if(type==="batch"){ const b=BATCHES.find(x=>x.id===id)||{}; push("program",b.program,progName(b.program),"Program"); }
  else if(type==="campaign"){ const c=CAMPAIGNS.find(x=>x.id===id)||{}; LEADS.filter(l=>l.source===c.channel).forEach(l=>push("lead",l.id,l.name,l.stage)); }
  else if(type==="review"){ const r=REVIEWS.find(x=>x.id===id)||{}; push("customer",custIdByName(r.customer),r.customer,"Customer"); push("order",r.orderId,r.orderId,"Order"); }
  else if(type==="task"){ const t=TASKS_G.find(x=>x.id===id)||{}; push("order",t.orderId,t.orderId,"Order"); push("lead",t.leadId,t.leadId,"Lead"); push("program",t.program,progName(t.program),"Program"); push("customer",custIdByName(t.customer),t.customer,"Customer"); }
  return R;
}
function uPerms(type){ return {payment:"Owner · CM (finance) — hidden from Kitchen",order:"All roles · pricing hidden from Kitchen",lead:"Owner · CM",customer:"Owner · CM",quote:"Owner · CM",program:"Owner · Ops",window:"Owner · Ops · Counter",task:"Assignee · Owner",communication:"Owner · CM",batch:"Kitchen · Owner",campaign:"Owner · Marketing",review:"Owner · Marketing"}[type]||"Owner"; }

function uBriefCard(type,id){
  const wrap=el('<div></div>');
  const b=el('<div class="ubrief"></div>');
  b.appendChild(el('<div class="uh">✦ AI Brief</div>'));
  uBrief(type,id).forEach(r=>b.appendChild(el('<div class="ur"><div class="k">'+r[0]+'</div><div>'+r[1]+'</div></div>')));
  wrap.appendChild(b);
  const rel=uRelated(type,id);
  if(rel.length){ wrap.appendChild(el('<h3 style="margin:14px 0 8px;font-size:13px">Related records</h3>')); const box=el('<div style="display:flex;flex-wrap:wrap"></div>'); rel.forEach(r=>{ const c=el('<div class="rchip"><div class="rb">'+(OBJ_BADGE[r.type]||r.type)+'</div><div class="rt">'+r.label+'</div><div class="rs">'+(r.sub||'')+'</div></div>'); c.onclick=()=>openObject(r.type,r.id); box.appendChild(c); }); wrap.appendChild(box); }
  return wrap;
}
function uDeepLink(type,id){
  const f=el('<div class="deeplink"><span>Visible to: '+uPerms(type)+'</span></div>');
  const b=el('<button class="btn sm ghost">Copy link</button>'); b.onclick=()=>{ const url=location.origin+location.pathname+"#"+type+"/"+encodeURIComponent(id); if(navigator.clipboard)navigator.clipboard.writeText(url); b.textContent="Copied ✓"; setTimeout(()=>b.textContent="Copy link",1200); };
  f.appendChild(b); return f;
}

/* ---- universal drawer for object types without a dedicated page ---- */
function uOpen(type,id){
  try{ history.replaceState(null,"","#"+type+"/"+encodeURIComponent(id)); }catch(e){}
  const titleMap={
    payment:()=>{const p=PAYMENTS.find(x=>x.id===id)||{};return[money(p.amount),p.method];},
    communication:()=>{const m=COMMS.find(x=>x.id===id)||{};return[m.title,m.channel+" · "+m.dir];},
    batch:()=>{const b=BATCHES.find(x=>x.id===id)||{};return[b.item+" · "+b.qty,progName(b.program)];},
    campaign:()=>{const c=CAMPAIGNS.find(x=>x.id===id)||{};return[c.name,c.channel];},
    review:()=>{const r=REVIEWS.find(x=>x.id===id)||{};return["★".repeat(r.rating)+" — "+r.customer,r.source];},
    task:()=>{const t=TASKS_G.find(x=>x.id===id)||{};return[t.t,"Due "+t.due];},
    window:()=>{const w=WINDOWS[id]||{};return[w.label,"Program window"];}
  };
  const tt=(titleMap[type]||(()=>[id,type]))();
  const statusMap={ payment:["Captured","green"], task:[(TASKS_G.find(x=>x.id===id)||{}).done?"Done":"Open",(TASKS_G.find(x=>x.id===id)||{}).done?"green":"ember"], batch:[(BATCHES.find(x=>x.id===id)||{}).short?"Shortage":"On schedule",(BATCHES.find(x=>x.id===id)||{}).short?"red":"green"], campaign:[(CAMPAIGNS.find(x=>x.id===id)||{}).status,(CAMPAIGNS.find(x=>x.id===id)||{}).status==="Active"?"green":""], review:["Verified","green"], communication:["Logged","blue"], window:["Open","ember"] };
  const st=statusMap[type]||["",""];
  const d=el('<div class="overlay"><div class="drawer"><div class="dh"><button class="x" onclick="closeDrawer()">×</button><div class="row" style="gap:8px"><span class="tag ember">'+(OBJ_BADGE[type]||type)+'</span><span class="tag" style="color:var(--mut2)">'+id+'</span>'+(st[0]?'<span class="tag '+st[1]+'">'+st[0]+'</span>':'')+'</div><h1 style="font-size:20px;margin:10px 0 2px">'+tt[0]+'</h1><div class="sub muted" style="font-size:13px">'+tt[1]+'</div></div><div class="db" id="uBody"></div></div></div>');
  document.getElementById("drawer").innerHTML=""; document.getElementById("drawer").appendChild(d);
  d.onclick=e=>{ if(e.target===d) closeDrawer(); };
  const body=d.querySelector("#uBody");
  body.appendChild(uBriefCard(type,id));
  // quick actions
  const qa=el('<div class="row" style="gap:8px;margin:14px 0 4px;flex-wrap:wrap"></div>');
  if(type==="task"){ const t=TASKS_G.find(x=>x.id===id); const b=el('<button class="btn primary sm">'+(t.done?"Reopen task":"Mark complete")+'</button>'); b.onclick=()=>{ t.done=!t.done; if(t.done)logActivity("task",id,"Task completed",t.t); uOpen(type,id); }; qa.appendChild(b); }
  if(type==="payment"){ qa.appendChild(el('<button class="btn sm ghost">View receipt</button>')); qa.appendChild(el('<button class="btn sm ghost">Refund (owner)</button>')); }
  if(type==="communication"){ qa.appendChild(el('<button class="btn sm">Reply</button>')); }
  if(type==="window"){ const b=el('<button class="btn primary sm">Open program</button>'); b.onclick=()=>openObject("program",(WINDOWS[id]||{}).program); qa.appendChild(b); }
  if(type==="campaign"){ qa.appendChild(el('<button class="btn sm ghost">Open in ad platform</button>')); }
  if(qa.children.length) body.appendChild(qa);
  // window: slots + manifest
  if(type==="window"){ const w=WINDOWS[id]; body.appendChild(el('<h3 style="margin:16px 0 8px;font-size:13px">Pickup manifest</h3>')); const t=el('<table><thead><tr><th>Customer</th><th>Qty</th><th>Slot</th><th>Status</th></tr></thead><tbody></tbody></table>'); (w.orders||[]).forEach(o=>t.querySelector("tbody").appendChild(el('<tr><td><b>'+o.name+'</b></td><td>'+o.qty+'</td><td class="muted">'+o.slot+'</td><td><span class="tag '+(o.paid?'green':'red')+'">'+(o.paid?'Paid':'Balance due')+'</span></td></tr>'))); body.appendChild(t); if(w.waitlist>0) body.appendChild(el('<div class="tag amber" style="margin-top:10px">Waitlist: '+w.waitlist+' waiting</div>')); }
  body.appendChild(uDeepLink(type,id));
}

/* ---- COMMAND PALETTE (⌘K / Ctrl+K) ---- */
function searchIndex(){
  const ix=[];
  CUSTOMERS.forEach(c=>ix.push({type:"customer",id:c.id,label:c.name,sub:"Customer · "+c.type}));
  LEADS.forEach(l=>ix.push({type:"lead",id:l.id,label:l.name,sub:"Lead · "+l.stage}));
  Object.values(QUOTES).forEach(q=>ix.push({type:"quote",id:q.key,label:quoteLabel(q)+" · "+q.customer,sub:"Quote · "+q.status}));
  ORDERS.forEach(o=>ix.push({type:"order",id:o.id,label:o.id+" · "+o.cust,sub:"Order · "+o.status}));
  Object.keys(PROGRAMS).forEach(k=>ix.push({type:"program",id:k,label:PROGRAMS[k].name,sub:"Program"}));
  PAYMENTS.forEach(p=>ix.push({type:"payment",id:p.id,label:money(p.amount)+" · "+p.customer,sub:"Payment"}));
  TASKS_G.forEach(t=>ix.push({type:"task",id:t.id,label:t.t,sub:"Task · "+t.due}));
  CAMPAIGNS.forEach(c=>ix.push({type:"campaign",id:c.id,label:c.name,sub:"Campaign · "+c.channel}));
  return ix;
}
let PAL_SEL=0, PAL_RES=[];
function openPalette(){ if(document.getElementById("app").classList.contains("hide")) return; if(document.getElementById("pal")) return closePalette();
  const ov=el('<div class="pal-ov" id="pal"><div class="pal"><input placeholder="Search customers, leads, quotes, orders, payments, tasks, campaigns…"><div class="res" id="palRes"></div><div class="hint">↑↓ to navigate · ↵ to open · Esc to close</div></div></div>');
  document.getElementById("drawer").appendChild(ov); ov.onclick=e=>{ if(e.target===ov) closePalette(); };
  const inp=ov.querySelector("input"); inp.oninput=()=>palRender(inp.value); inp.focus(); palRender("");
}
function palRender(q){ const res=document.getElementById("palRes"); if(!res)return; const ql=q.trim().toLowerCase();
  PAL_RES=searchIndex().filter(x=>!ql|| (x.label+" "+x.sub+" "+x.id).toLowerCase().includes(ql)).slice(0,40); PAL_SEL=0;
  res.innerHTML=""; if(!PAL_RES.length){ res.appendChild(el('<div class="hint">No matches for “'+q+'”</div>')); return; }
  PAL_RES.forEach((r,i)=>{ const row=el('<div class="r '+(i===0?'sel':'')+'"><span class="rb">'+(OBJ_BADGE[r.type]||r.type)+'</span><span class="rt">'+r.label+'</span><span class="rs">'+r.sub+'</span></div>'); row.onclick=()=>{ closePalette(); openObject(r.type,r.id); }; res.appendChild(row); });
}
function palMove(d){ const rows=[...document.querySelectorAll("#palRes .r")]; if(!rows.length)return; rows[PAL_SEL]&&rows[PAL_SEL].classList.remove("sel"); PAL_SEL=(PAL_SEL+d+rows.length)%rows.length; rows[PAL_SEL].classList.add("sel"); rows[PAL_SEL].scrollIntoView({block:"nearest"}); }
function closePalette(){ const p=document.getElementById("pal"); if(p)p.remove(); }

/* ---- GLOBAL ACTIVITY FEED ---- */
function activityIcon(v){ return {"Lead created":"✚","Quote sent":"✉","Quote viewed":"👁","Deposit paid":"$","Order created":"▤","Order locked":"🔒","Payment received":"$","Kitchen started":"♨","Pickup completed":"✓","Task completed":"✓","Task overdue":"⚠","Amendment created":"✎","Kitchen shortage flagged":"⚠","Review received":"★"}[v]||"•"; }
function openActivity(){ if(document.getElementById("actov")) return closeActivity();
  const ov=el('<div class="pal-ov" id="actov"><div class="pal"><div style="padding:14px 18px;border-bottom:1px solid var(--line);font-weight:700">⚡ Activity feed <span class="mut2" style="font-weight:400;font-size:12px">· recent events across FireDrop</span></div><div class="res" id="actRes"></div></div></div>');
  document.getElementById("drawer").appendChild(ov); ov.onclick=e=>{ if(e.target===ov) closeActivity(); };
  const res=ov.querySelector("#actRes");
  ACTIVITY.forEach(a=>{ const row=el('<div class="r"><span class="rb">'+activityIcon(a.verb)+'</span><span class="rt">'+a.verb+'</span><span class="rs">'+a.label+' · '+a.time+'</span></div>'); row.onclick=()=>{ closeActivity(); openObject(a.ot,a.id); }; res.appendChild(row); });
}
function closeActivity(){ const a=document.getElementById("actov"); if(a)a.remove(); }
function activityCard(){
  const c=el('<div class="card" style="margin-top:16px"><div class="between"><h3>⚡ Activity feed</h3><button class="btn sm ghost">View all</button></div><div class="csub">Recent events across FireDrop · click any to open the object</div></div>');
  c.querySelector("button").onclick=openActivity;
  ACTIVITY.slice(0,6).forEach(a=>{ const row=el('<div class="between" style="padding:9px 0;border-top:1px solid var(--line);cursor:pointer"><span><b style="font-size:13px">'+a.verb+'</b> <span class="muted" style="font-size:12px">· '+a.label+'</span></span><span class="mut2" style="font-size:11px">'+a.time+'</span></div>'); row.onclick=()=>openObject(a.ot,a.id); c.appendChild(row); });
  return c;
}

/* ---- global keys + topbar wiring + deep-link on load ---- */
document.addEventListener("keydown",e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){ e.preventDefault(); openPalette(); return; }
  if(document.getElementById("pal")){ if(e.key==="Escape")closePalette(); else if(e.key==="ArrowDown"){e.preventDefault();palMove(1);} else if(e.key==="ArrowUp"){e.preventDefault();palMove(-1);} else if(e.key==="Enter"){ const r=PAL_RES[PAL_SEL]; if(r){closePalette();openObject(r.type,r.id);} } }
  else if(e.key==="Escape"){ closeActivity(); }
});
(function wireOS(){
  const si=document.querySelector(".topbar .search input"); if(si){ si.readOnly=true; si.style.cursor="pointer"; si.placeholder="Search…  ⌘K"; si.onclick=openPalette; }
  const tb=document.querySelector(".topbar .date"); if(tb){ const b=el('<button class="tbtn" title="Activity feed" style="margin-left:auto">⚡ Activity</button>'); b.onclick=openActivity; tb.parentNode.insertBefore(b,tb); tb.style.marginLeft="14px"; }
  const _enter=window.enterApp; window.enterApp=function(){ _enter(); setTimeout(routeHash,60); };
})();
function routeHash(){ const h=(location.hash||"").replace(/^#/,""); if(!h)return; const i=h.indexOf("/"); if(i<0)return; const type=h.slice(0,i), id=decodeURIComponent(h.slice(i+1)); if(OBJ_BADGE[type]) openObject(type,id); }
</script>
